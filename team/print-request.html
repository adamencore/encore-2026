<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printed Materials Request</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --encore-purple: #4A154B;
            --mikado-yellow: #FFC72C;
            --text-dark: #2D3748;
            --bg-light: #F7FAFC;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid var(--encore-purple);
        }

        .back-link {
            display: inline-block;
            color: var(--encore-purple);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        h2 {
            color: var(--encore-purple);
            margin-bottom: 0.5rem;
            font-size: 1.75rem;
        }

        p.subtitle {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .elfsight-embed-container {
            width: 100%;
            min-height: 400px;
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="/team/" class="back-link">← Back to Dashboard</a>
        <h2>Printed Materials Request</h2>
        <p class="subtitle">Submit requests for flyer prints, operational documents, and event signage.</p>

        <div class="elfsight-embed-container">
            <script src="https://elfsightcdn.com/platform.js" async></script>
            <div class="elfsight-app-e82850dd-4bcb-49a9-9b0d-9c4903021582" data-elfsight-app-lazy></div>
        </div>
    </div>

</body>
</html>
