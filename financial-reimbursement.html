<!DOCTYPE html>
<!-- Encore Team — Financial Reimbursement. Protected under /team/. Uses Netlify Forms. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Financial Reimbursement | Encore Team Hub</title>
<meta name="theme-color" content="#322949">
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/fonts/mikado.css">
<style>
  :root{--purple:#322949;--purple2:#473a63;--cream-lite:#f5f1ec;--paper:#fffdf9;--coral-4:#e8716b;--muted:#5d566f;--line:rgba(32,65,74,.16)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Familjen Grotesk',system-ui,sans-serif;background:var(--cream-lite);color:var(--purple);-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:clip}
  a{color:inherit;text-decoration:none}
  h1,h2{font-family:'Mikado',Georgia,serif;letter-spacing:-.01em}
  .topbar{background:var(--paper);border-bottom:1px solid var(--line)}
  .topbar-in{max-width:760px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .topbar .brandmark{height:22px;color:var(--purple)}
  .tb-right{display:flex;align-items:center;gap:14px}
  .tb-badge{font-family:'Mikado',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--purple);border-radius:100px;padding:6px 12px}
  .tb-logout{font-size:13.5px;color:var(--muted)}
  .wrap{max-width:760px;margin:0 auto;padding:36px 20px 72px}
  .back{font-family:'Mikado',sans-serif;font-weight:600;font-size:13px;color:var(--muted)}
  .back:hover{color:var(--purple)}
  h1{font-weight:500;font-size:clamp(30px,6vw,44px);line-height:1.02;margin:14px 0 8px}
  .lead{color:var(--muted);font-size:16px;max-width:560px;margin-bottom:26px}
  form{display:grid;gap:18px}
  .row{display:grid;gap:16px;grid-template-columns:1fr 1fr}
  .field{display:flex;flex-direction:column;gap:7px;min-width:0}
  label{font-family:'Mikado',sans-serif;font-weight:600;font-size:13px;color:var(--purple)}
  label .req{color:var(--coral-4)}
  input,select,textarea{font:inherit;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--purple);width:100%}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--purple2);border-color:transparent}
  textarea{min-height:110px;resize:vertical}
  input[type=file]{padding:10px;background:var(--cream-lite)}
  .hint{font-size:12.5px;color:var(--muted)}
  button{font-family:'Mikado',sans-serif;font-weight:600;font-size:16px;padding:15px;border:0;border-radius:14px;background:var(--purple);color:#fff;cursor:pointer;margin-top:6px}
  button:hover{background:var(--purple2)}
  .hp{position:absolute;left:-9999px}
  @media(max-width:560px){.row{grid-template-columns:1fr}.wrap{padding:28px 16px 60px}}
</style>
</head>
